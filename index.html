<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week Inspiration Deck</title>

  <!-- SAnE: LAYOUT ONLY -->
  <style>
    /* ===================== */
    /* LAYOUT */
    /* ===================== */

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f3ee;
      color: #2b2b2b;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 32px;
      color: #666;
      font-size: 1rem;
    }

    .week-card {
      margin-bottom: 28px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    .card {
      min-height: 260px;
      border-radius: 18px;
      border: 2px solid #ddd3c3;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
    }

    .week-card .card {
      min-height: 420px;
    }

    .label {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    .hint {
      color: #777;
      font-size: 0.95rem;
      text-align: center;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .card,
      .week-card .card {
        min-height: 280px;
      }

      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>

  <!-- ===================== -->
  <!-- LAYOUT -->
  <!-- ===================== -->

  <main class="page">
    <h1>Week Inspiration Deck (while Dima is away... ✈️🚢🌴🎉)</h1>
    <div class="subtitle">One weekly theme, five daily reveals - click a card to open...</div>

    <section class="week-card">
      <div class="card">
        <div class="label">Weekly Theme</div>
        <div class="hint">Click to reveal the theme for the week</div>
      </div>
    </section>

    <section class="cards">

      <div class="card">
        <div class="label">Monday</div>
        <div class="hint">Click to reveal</div>
      </div>

      <div class="card">
        <div class="label">Tuesday</div>
        <div class="hint">Click to reveal</div>
      </div>

      <div class="card">
        <div class="label">Wednesday</div>
        <div class="hint">Click to reveal</div>
      </div>

      <div class="card">
        <div class="label">Thursday</div>
        <div class="hint">Click to reveal</div>
      </div>

      <div class="card">
        <div class="label">Friday</div>
        <div class="hint">Click to reveal</div>
      </div>

    </section>
  </main>

</body>
</html>
