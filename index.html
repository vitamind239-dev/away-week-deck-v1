<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Week Inspiration Deck</title>

<style>

/* ===================== */
/* LAYOUT */
/* ===================== */

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f3ee;
  color: #2b2b2b;
}

.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 18px 48px;
}

h1 {
  text-align: center;
  margin-bottom: 8px;
  font-size: 2rem;
}

.subtitle {
  text-align: center;
  margin-bottom: 32px;
  color: #666;
  font-size: 1rem;
}

.week-card {
  margin-bottom: 28px;
}

/* 🔧 FIX: lock 5 cards on desktop */
.cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}

/* ===================== */
/* CONTENT */
/* ===================== */

.card {
  border-radius: 18px;
  border: 2px solid #ddd3c3;
  background: #ffffff;
  box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
  overflow: hidden;
}

.card-image {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover; /* 🔧 removes white gap */
}

.label {
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 10px;
  text-align: center;
}

.hint {
  color: #777;
  font-size: 0.95rem;
  text-align: center;
}

/* ===================== */
/* BANNER */
/* ===================== */

.banner {
  cursor: pointer;
  position: relative;
}

.banner-front {
  padding: 120px 20px; /* gives visual height */
  text-align: center;
}

.banner-back {
  display: none;
  height: 100%;
}

.banner.flipped .banner-front {
  display: none;
}

.banner.flipped .banner-back {
  display: block;
}

/* ===================== */
/* RESPONSIVE */
/* ===================== */

@media (max-width: 900px) {
  .cards {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .cards {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<main class="page">

<h1>Week Inspiration Deck (while Dima is away... ✈️🚢🌴🎉)</h1>
<div class="subtitle">
One weekly theme, five daily reveals - click a card to open...
</div>

<!-- WEEK -->

<section class="week-card">
  <div class="card banner" onclick="toggleBanner(this)">

    <div class="banner-front">
      <div class="label">Weekly Theme</div>
      <div class="hint">Click to reveal the theme for the week</div>
    </div>

    <div class="banner-back">
      <img class="card-image" src="./week04_banner.png">
    </div>

  </div>
</section>

<!-- DAYS -->

<section class="cards">

  <div class="card"><img class="card-image" src="./week04_mon.png"></div>
  <div class="card"><img class="card-image" src="./week04_tue.png"></div>
  <div class="card"><img class="card-image" src="./week04_wed.png"></div>
  <div class="card"><img class="card-image" src="./week04_thu.png"></div>
  <div class="card"><img class="card-image" src="./week04_fri.png"></div>

</section>

</main>

<script>
function toggleBanner(el) {
  el.classList.toggle("flipped");
}
</script>

</body>
</html>
