<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week Inspiration Deck</title>

  <style>
    /* ===================== */
    /* LAYOUT */
    /* ===================== */

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f3ee;
      color: #2b2b2b;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 32px;
      color: #666;
      font-size: 1rem;
    }

    .week-card {
      margin-bottom: 28px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ===================== */
    /* CONTENT */
    /* ===================== */

    .card {
      border-radius: 18px;
      border: 2px solid #ddd3c3;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .label {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    .hint {
      color: #777;
      font-size: 0.95rem;
      text-align: center;
    }

    /* ===================== */
    /* BANNER BEHAVIOR (SAFE) */
    /* ===================== */

    .banner {
      cursor: pointer;
    }

    .banner-front {
      padding: 40px 20px;
      text-align: center;
    }

    .banner-back {
      display: none;
    }

    .banner.flipped .banner-front {
      display: none;
    }

    .banner.flipped .banner-back {
      display: block;
    }

  </style>
</head>

<body>

  <main class="page">

    <h1>Week Inspiration Deck (while Dima is away... ✈️🚢🌴🎉)</h1>
    <div class="subtitle">
      One weekly theme, five daily reveals - click a card to open...
    </div>

    <!-- ===================== -->
    <!-- WEEK BANNER -->
    <!-- ===================== -->

    <section class="week-card">

      <div class="card banner" onclick="toggleBanner(this)">

        <!-- FRONT -->
        <div class="banner-front">
          <div class="label">Weekly Theme</div>
          <div class="hint">Click to reveal the theme for the week</div>
        </div>

        <!-- BACK -->
        <div class="banner-back">
          <img class="card-image" src="./week04_banner.png" alt="Weekly theme">
        </div>

      </div>

    </section>

    <!-- ===================== -->
    <!-- DAY CARDS (UNCHANGED) -->
    <!-- ===================== -->

    <section class="cards">

      <div class="card">
        <img class="card-image" src="./week04_mon.png" alt="Monday">
      </div>

      <div class="card">
        <img class="card-image" src="./week04_tue.png" alt="Tuesday">
      </div>

      <div class="card">
        <img class="card-image" src="./week04_wed.png" alt="Wednesday">
      </div>

      <div class="card">
        <img class="card-image" src="./week04_thu.png" alt="Thursday">
      </div>

      <div class="card">
        <img class="card-image" src="./week04_fri.png" alt="Friday">
      </div>

    </section>

  </main>

  <!-- ===================== -->
  <!-- SCRIPT -->
  <!-- ===================== -->

  <script>
    function toggleBanner(el) {
      el.classList.toggle("flipped");
    }
  </script>

</body>
</html>
