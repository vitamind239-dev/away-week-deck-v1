<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week Inspiration Deck</title>

  <style>
    /* ===================== */
    /* LAYOUT */
    /* ===================== */

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f3ee;
      color: #2b2b2b;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 32px;
      color: #666;
      font-size: 1rem;
    }

    .week-card {
      margin-bottom: 28px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ===================== */
    /* CONTENT (BASE CARD) */
    /* ===================== */

    .card {
      border-radius: 18px;
      border: 2px solid #ddd3c3;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .label {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    .hint {
      color: #777;
      font-size: 0.95rem;
      text-align: center;
    }

    /* ===================== */
    /* BEHAVIOR STRUCTURE (BANNER ONLY) */
    /* ===================== */

    .banner {
      cursor: pointer;
      position: relative;
    }

    .banner-inner {
      position: relative;
      width: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .banner.flipped .banner-inner {
      transform: rotateY(180deg);
    }

    .banner-front,
    .banner-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
    }

    .banner-front {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .banner-back {
      transform: rotateY(180deg);
    }

    /* THIS is the key SAnE fix:
       height is anchored at container level, not patched later */
    .banner-inner {
      min-height: 420px;
    }

    /* ===================== */
    /* BEHAVIOR: EXPAND */
    /* ===================== */

    .banner.expanded {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.02);
      width: 90vw;
      max-width: 1100px;
      z-index: 1001;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }

  </style>
</head>

<body>

  <main class="page">

    <h1>Week Inspiration Deck (while Dima is away... ✈️🚢🌴🎉)</h1>
    <div class="subtitle">One weekly theme, five daily reveals - click a card to open...</div>

    <!-- ===================== -->
    <!-- WEEK BANNER -->
    <!-- ===================== -->

    <section class="week-card">

      <div class="card banner" onclick="toggleBanner(this)">
        <div class="banner-inner">

          <!-- FRONT -->
          <div class="banner-front">
            <div class="label">Weekly Theme</div>
            <div class="hint">Click to reveal the theme for the week</div>
          </div>

          <!-- BACK -->
          <div class="banner-back">
            <img class="card-image" src="./week04_banner.png">
          </div>

        </div>
      </div>

    </section>

    <!-- ===================== -->
    <!-- DAY CARDS (UNCHANGED) -->
    <!-- ===================== -->

    <section class="cards">

      <div class="card">
        <img class="card-image" src="./week04_mon.png">
      </div>

      <div class="card">
        <img class="card-image" src="./week04_tue.png">
      </div>

      <div class="card">
        <img class="card-image" src="./week04_wed.png">
      </div>

      <div class="card">
        <img class="card-image" src="./week04_thu.png">
      </div>

      <div class="card">
        <img class="card-image" src="./week04_fri.png">
      </div>

    </section>

  </main>

  <!-- ===================== -->
  <!-- BEHAVIOR SCRIPT -->
  <!-- ===================== -->

  <script>
    function toggleBanner(el) {

      if (el.classList.contains('expanded')) {
        el.classList.remove('expanded');
        el.classList.remove('flipped');
        document.querySelector('.overlay')?.remove();
        return;
      }

      document.querySelector('.overlay')?.remove();

      el.classList.add('expanded');
      el.classList.add('flipped');

      const overlay = document.createElement('div');
      overlay.className = 'overlay';

      overlay.onclick = () => {
        el.classList.remove('expanded');
        el.classList.remove('flipped');
        overlay.remove();
      };

      document.body.appendChild(overlay);
    }
  </script>

</body>
</html>
