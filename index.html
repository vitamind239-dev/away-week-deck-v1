<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week Inspiration Deck</title>

  <!-- SAnE: LAYOUT + CONTENT (clean separation) -->
  <style>
    /* ===================== */
    /* LAYOUT (shared) */
    /* ===================== */

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f3ee;
      color: #2b2b2b;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 32px;
      color: #666;
      font-size: 1rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .cards {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.6rem;
      }
    }

    /* ===================== */
    /* CONTENT: SHARED CARD BASE */
    /* ===================== */

    .card {
      border-radius: 18px;
      border: 2px solid #ddd3c3;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
      overflow: visible;
    }

    .card-image {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    /* ===================== */
    /* CONTENT: WEEK BANNER */
    /* ===================== */

    .week-card {
      margin-bottom: 28px;
    }

    .week-card .card {
      padding: 0;
    }

    /* ===================== */
    /* CONTENT: DAY CARDS */
    /* ===================== */

    .day-card .card {
      padding: 0;
    }

  </style>
</head>

<body>

  <!-- ===================== -->
  <!-- LAYOUT -->
  <!-- ===================== -->

  <main class="page">
    <h1>Week Inspiration Deck (while Dima is away... ✈️🚢🌴🎉)</h1>
    <div class="subtitle">One weekly theme, five daily reveals - click a card to open...</div>

    <!-- ===================== -->
    <!-- CONTENT: WEEK BANNER -->
    <!-- ===================== -->

    <section class="week-card">
      <div class="card">
        <img class="card-image" src="./week04_banner.png" alt="Weekly theme">
      </div>
    </section>

    <!-- ===================== -->
    <!-- CONTENT: DAY CARDS -->
    <!-- ===================== -->

    <section class="cards">

      <div class="day-card">
        <div class="card">
          <img class="card-image" src="./week04_mon.png" alt="Monday">
        </div>
      </div>

      <div class="day-card">
        <div class="card">
          <img class="card-image" src="./week04_tue.png" alt="Tuesday">
        </div>
      </div>

      <div class="day-card">
        <div class="card">
          <img class="card-image" src="./week04_wed.png" alt="Wednesday">
        </div>
      </div>

      <div class="day-card">
        <div class="card">
          <img class="card-image" src="./week04_thu.png" alt="Thursday">
        </div>
      </div>

      <div class="day-card">
        <div class="card">
          <img class="card-image" src="./week04_fri.png" alt="Friday">
        </div>
      </div>

    </section>
  </main>

</body>
</html>
