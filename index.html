<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week Inspiration Deck</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f3ee;
}

.page {
  max-width: 1200px;
  margin: auto;
  padding: 30px 16px;
}

h1 { text-align: center; }
.subtitle { text-align: center; margin-bottom: 24px; }

.cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}

.card {
  border-radius: 18px;
  overflow: hidden;
  border: 2px solid #ddd3c3;
  box-shadow: 0 8px 22px rgba(0,0,0,0.12);
  background: white;
}

.cards .card {
  aspect-ratio: 4/3;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BANNER (LOCKED) */

.banner-front { padding: 80px 20px; text-align: center; }
.banner-back img { width:100%; display:block; }

.banner-back { display:none; }
.banner.flipped .banner-front { display:none; }
.banner.flipped .banner-back { display:block; }

/* INTERACTIVE */

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  z-index: 100;
}

.interactive {
  cursor: pointer;
  position: relative;
}

.interactive.active {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 70vw;
  max-width: 900px;
  aspect-ratio: 4/3;
  transform: translate(-50%, -50%);
  z-index: 200;
}

.flip {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.interactive.flipped .flip {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
}

.back {
  transform: rotateY(180deg);
}

.placeholder {
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  height:100%;
}

</style>
</head>

<body>

<main class="page">

<h1>Week Inspiration Deck</h1>
<div class="subtitle">
One weekly theme, five daily reveals - click a card to open...
</div>

<!-- BANNER -->
<div class="card banner" onclick="toggleBanner(this)">
  <div class="banner-front">
    <strong>Weekly Theme</strong><br>
    <span style="color:#777;">Click to reveal the theme</span>
  </div>
  <div class="banner-back">
    <img src="./week04_banner.png">
  </div>
</div>

<br>

<div id="overlay" class="overlay" onclick="closeActiveCard()"></div>

<div class="cards">

<div class="card interactive" data-day="1" onclick="toggleCard(event)">
  <div class="flip">
    <!--<div class="face placeholder"><strong>Monday</strong></div> -->
    <div class="face placeholder">
    <strong>Monday</strong>
    <span style="color:#777; font-size:14px;">Click to reveal...</span>
    </div>
    <div class="face back"><img src="./week04_mon.png"></div>
  </div>
</div>

<div class="card interactive" data-day="2" onclick="toggleCard(event)">
  <div class="flip">
    <<!--<div class="face placeholder"><strong>Tuesday</strong></div> -->
    <div class="face placeholder">
    <strong>Tuesday</strong>
    <span style="color:#777; font-size:14px;">Click to reveal...</span>
    </div>
    <div class="face back"><img src="./week04_tue.png"></div>
  </div>
</div>

<div class="card interactive" data-day="3" onclick="toggleCard(event)">
  <div class="flip">
    <!--<div class="face placeholder"><strong>Wednesday</strong></div>-->
    <div class="face placeholder">
    <strong>Wednesday</strong>
    <span style="color:#777; font-size:14px;">Click to reveal...</span>
    </div>
    <div class="face back"><img src="./week04_wed.png"></div>
  </div>
</div>

<div class="card interactive" data-day="4" onclick="toggleCard(event)">
  <div class="flip">
    <!--<div class="face placeholder"><strong>Thursday</strong></div> -->
    <div class="face placeholder">
    <strong>Thursday</strong>
    <span style="color:#777; font-size:14px;">Click to reveal...</span>
    </div>    
    <div class="face back"><img src="./week04_thu.png"></div>
  </div>
</div>

<div class="card interactive" data-day="5" onclick="toggleCard(event)">
  <div class="flip">
    <!--<div class="face placeholder"><strong>Friday</strong></div> -->
    <div class="face placeholder">
    <strong>Friday</strong>
    <span style="color:#777; font-size:14px;">Click to reveal...</span>
    </div> 
    <div class="face back"><img src="./week04_fri.png"></div>
  </div>
</div>

</div>

</main>

<script>

/* BANNER */
function toggleBanner(el){
  el.classList.toggle("flipped");
}

/* TIME LOCK */

function isUnlocked(dayIndex) {

  const now = new Date();

  const alaskaNow = new Date(
    now.toLocaleString("en-US", { timeZone: "America/Anchorage" })
  );

  // Build Alaska-based start correctly
  const start = new Date(alaskaNow);
  start.setHours(0, 0, 0, 0);

  // Move to Monday of this week
  const dayOfWeek = alaskaNow.getDay(); // 0=Sun
  const diffToMonday = (dayOfWeek + 6) % 7;
  start.setDate(alaskaNow.getDate() - diffToMonday);

  // Add offset per card
  start.setDate(start.getDate() + (dayIndex - 1));

  return alaskaNow >= start;
}

/* CARD */

function toggleCard(e){

  const card = e.currentTarget;
  const day = Number(card.dataset.day);

  if (!isUnlocked(day)) return;

  const overlay = document.getElementById("overlay");

  if (!card.classList.contains("active")) {

    closeActiveCard();
    overlay.style.display = "block";
    card.classList.add("active");

    setTimeout(() => card.classList.add("flipped"), 120);

  } else {
    closeActiveCard();
  }
}

function closeActiveCard(){
  const overlay = document.getElementById("overlay");
  const active = document.querySelector(".interactive.active");

  if (!active) return;

  active.classList.remove("flipped");

  setTimeout(() => {
    active.classList.remove("active");
    overlay.style.display = "none";
  }, 300);
}

</script>

</body>
</html>
