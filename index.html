<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Week Inspiration Deck</title>

<style>

/* ===================== */
/* LAYOUT */
/* ===================== */

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f3ee;
}

.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 18px;
}

h1 { text-align: center; }
.subtitle { text-align: center; margin-bottom: 24px; }

/* ===================== */
/* GRID */
/* ===================== */

.cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}

/* ===================== */
/* CARD */
/* ===================== */

.card {
  border-radius: 18px;
  overflow: hidden;
  border: 2px solid #ddd3c3;
  box-shadow: 0 8px 22px rgba(0,0,0,0.12);
  background: white;
  cursor: pointer;
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===================== */
/* BANNER (UNCHANGED) */
/* ===================== */

.banner {
  position: relative;
  cursor: pointer;
}

.banner-front,
.banner-back {
  position: relative;
}

.banner-front {
  padding: 80px 20px;
  text-align: center;
}

.banner-back img {
  width: 100%;
  height: auto;
  display: block;
}

.banner-back { display: none; }
.banner.flipped .banner-front { display: none; }
.banner.flipped .banner-back { display: block; }

/* ===================== */
/* MONDAY CARD BEHAVIOR */
/* ===================== */

/* isolate Monday */
.monday {
  position: relative;
  z-index: 1;
}

/* overlay backdrop */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 100;
}

/* active state */
.monday.active {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 60vw;
  max-width: 700px;
  transform: translate(-50%, -50%) scale(1.2);
  z-index: 200;
  transition: all 0.3s ease;
}

/* flip container */
.flip {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.monday.flipped .flip {
  transform: rotateY(180deg);
}

.front,
.back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
}

.back {
  transform: rotateY(180deg);
}

/* front placeholder */
.placeholder {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
}

/* ===================== */

</style>
</head>

<body>

<main class="page">

<h1>Week Inspiration Deck (while Dima is away... ✈️🚢🌴🎉)</h1>
<div class="subtitle">
One weekly theme, five daily reveals - click a card to open...
</div>

<!-- ===================== -->
<!-- BANNER (UNCHANGED) -->
<!-- ===================== -->

<div class="card banner" onclick="toggleBanner(this)">
  <div class="banner-front">
    <div style="font-size:1.4rem;font-weight:bold;">Weekly Theme</div>
    <div style="color:#777;">Click to reveal the theme for the week</div>
  </div>
  <div class="banner-back">
    <img src="./week04_banner.png">
  </div>
</div>

<br>

<!-- overlay -->
<div class="overlay" id="overlay" onclick="closeMonday()"></div>

<!-- ===================== -->
<!-- DAYS -->
<!-- ===================== -->

<div class="cards">

  <!-- MONDAY -->
  <div class="card monday" onclick="openMonday(event)">
    <div class="flip">

      <div class="front placeholder">
        <div><strong>Monday</strong></div>
        <div style="color:#777;">Click to reveal</div>
      </div>

      <div class="back">
        <img class="card-image" src="./week04_mon.png">
      </div>

    </div>
  </div>

  <!-- OTHERS (UNCHANGED) -->
  <div class="card"><img class="card-image" src="./week04_tue.png"></div>
  <div class="card"><img class="card-image" src="./week04_wed.png"></div>
  <div class="card"><img class="card-image" src="./week04_thu.png"></div>
  <div class="card"><img class="card-image" src="./week04_fri.png"></div>

</div>

</main>

<script>

function toggleBanner(el) {
  el.classList.toggle("flipped");
}

/* MONDAY LOGIC */

function openMonday(e) {
  const card = e.currentTarget;
  const overlay = document.getElementById("overlay");

  if (!card.classList.contains("active")) {
    overlay.style.display = "block";
    card.classList.add("active");

    setTimeout(() => {
      card.classList.add("flipped");
    }, 100);
  }
}

function closeMonday() {
  const card = document.querySelector(".monday");
  const overlay = document.getElementById("overlay");

  card.classList.remove("flipped");

  setTimeout(() => {
    card.classList.remove("active");
    overlay.style.display = "none";
  }, 300);
}

</script>

</body>
</html>
