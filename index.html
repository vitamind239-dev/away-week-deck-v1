<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Week Inspiration Deck</title>

<style>

/* ===================== */
/* LAYOUT */
/* ===================== */

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f3ee;
  color: #2b2b2b;
}

.page {
  max-width: 1200px; /* 🔧 widened so 5 cards fit */
  margin: 0 auto;
  padding: 32px 18px 48px;
}

h1 {
  text-align: center;
  margin-bottom: 8px;
  font-size: 2rem;
}

.subtitle {
  text-align: center;
  margin-bottom: 32px;
  color: #666;
  font-size: 1rem;
}

.week-card {
  margin-bottom: 28px;
}

/* 🔧 FIX 1: true 5-column layout */
.cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}

/* ===================== */
/* CONTENT */
/* ===================== */

.card {
  border-radius: 18px;
  border: 2px solid #ddd3c3;
  background: #ffffff;
  box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
  overflow: hidden;
}

.card-image {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

/* ===================== */
/* BANNER (STRUCTURAL FIX) */
/* ===================== */

.banner {
  cursor: pointer;
  position: relative;
  height: 420px; /* 🔧 FIX 2: lock height */
}

/* stack instead of remove */
.banner-front,
.banner-back {
  position: absolute;
  inset: 0;
}

.banner-front {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.banner-back {
  opacity: 0;
  transition: opacity 0.3s ease;
}

/* 🔧 no layout shift */
.banner.flipped .banner-back {
  opacity: 1;
}

.banner.flipped .banner-front {
  opacity: 0;
}

/* ===================== */
/* RESPONSIVE */
/* ===================== */

@media (max-width: 900px) {
  .cards {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .cards {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<main class="page">

<h1>Week Inspiration Deck (while Dima is away... ✈️🚢🌴🎉)</h1>
<div class="subtitle">
One weekly theme, five daily reveals - click a card to open...
</div>

<!-- WEEK -->

<section class="week-card">

  <div class="card banner" onclick="toggleBanner(this)">

    <div class="banner-front">
      <div style="font-size:1.4rem;font-weight:bold;">Weekly Theme</div>
      <div style="color:#777;margin-top:8px;">Click to reveal the theme for the week</div>
    </div>

    <div class="banner-back">
      <img class="card-image" src="./week04_banner.png">
    </div>

  </div>

</section>

<!-- DAYS -->

<section class="cards">

  <div class="card"><img class="card-image" src="./week04_mon.png"></div>
  <div class="card"><img class="card-image" src="./week04_tue.png"></div>
  <div class="card"><img class="card-image" src="./week04_wed.png"></div>
  <div class="card"><img class="card-image" src="./week04_thu.png"></div>
  <div class="card"><img class="card-image" src="./week04_fri.png"></div>

</section>

</main>

<script>
function toggleBanner(el) {
  el.classList.toggle("flipped");
}
</script>

</body>
</html>
