<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Week Inspiration Deck</title>

<style>

/* ===================== */
/* LAYOUT */
/* ===================== */

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f5f3ee;
}

.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 18px;
}

h1 {
  text-align: center;
}

.subtitle {
  text-align: center;
  margin-bottom: 24px;
}

/* ===================== */
/* GRID */
/* ===================== */

.cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}

/* ===================== */
/* CARD */
/* ===================== */

.card {
  border-radius: 18px;
  overflow: hidden;
  border: 2px solid #ddd3c3;
  box-shadow: 0 8px 22px rgba(0,0,0,0.12);
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===================== */
/* BANNER (SAnE MODEL) */
/* ===================== */

.banner {
  position: relative;
  cursor: pointer;
}

/* key: NO fixed height */

.banner-front,
.banner-back {
  position: relative;
}

/* front = natural height container */
.banner-front {
  padding: 80px 20px;
  text-align: center;
}

/* back = image defines height */
.banner-back img {
  width: 100%;
  height: auto;
  display: block;
}

/* flip via display swap (no layout trickery) */
.banner-back { display: none; }
.banner.flipped .banner-front { display: none; }
.banner.flipped .banner-back { display: block; }

</style>
</head>

<body>

<main class="page">

<h1>Week Inspiration Deck (while Dima is away... ✈️🚢🌴🎉)</h1>
<div class="subtitle">
One weekly theme, five daily reveals - click a card to open...
</div>

<!-- ===================== -->
<!-- BANNER -->
<!-- ===================== -->

<div class="card banner" onclick="toggleBanner(this)">

  <div class="banner-front">
    <div style="font-size:1.4rem;font-weight:bold;">Weekly Theme</div>
    <div style="color:#777;">Click to reveal the theme for the week</div>
  </div>

  <div class="banner-back">
    <img src="./week04_banner.png">
  </div>

</div>

<br>

<!-- ===================== -->
<!-- DAYS -->
<!-- ===================== -->

<div class="cards">
  <div class="card"><img class="card-image" src="./week04_mon.png"></div>
  <div class="card"><img class="card-image" src="./week04_tue.png"></div>
  <div class="card"><img class="card-image" src="./week04_wed.png"></div>
  <div class="card"><img class="card-image" src="./week04_thu.png"></div>
  <div class="card"><img class="card-image" src="./week04_fri.png"></div>
</div>

</main>

<script>
function toggleBanner(el) {
  el.classList.toggle("flipped");
}
</script>

</body>
</html>
