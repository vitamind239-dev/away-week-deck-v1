<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week Inspiration Deck</title>

  <style>
    /* ===================== */
    /* LAYOUT */
    /* ===================== */

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f3ee;
      color: #2b2b2b;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 32px;
      color: #666;
      font-size: 1rem;
    }

    .week-card {
      margin-bottom: 28px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ===================== */
    /* CONTENT: BASE CARD */
    /* ===================== */

    .card {
      border-radius: 18px;
      border: 2px solid #ddd3c3;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    .card-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ===================== */
    /* CONTENT: WEEK */
    /* ===================== */

    .week-card .card {
      cursor: pointer;
    }

    /* ===================== */
    /* CONTENT: DAY */
    /* ===================== */

    .day-card .card {
      cursor: pointer;
    }

    /* ===================== */
    /* BEHAVIOR: EXPANSION */
    /* ===================== */

    .card.expanded {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.02);
      width: 90vw;
      max-width: 1100px;
      z-index: 1001;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }

    /* ===================== */
    /* RESPONSIVE */
    /* ===================== */

    @media (max-width: 600px) {
      h1 {
        font-size: 1.6rem;
      }
    }

  </style>
</head>

<body>

  <main class="page">

    <h1>Week Inspiration Deck (while Dima is away... ✈️🚢🌴🎉)</h1>
    <div class="subtitle">One weekly theme, five daily reveals - click a card to open...</div>

    <!-- ===================== -->
    <!-- WEEK -->
    <!-- ===================== -->

    <section class="week-card">
      <div class="card" onclick="toggleCard(this)">
        <div class="card-inner">

          <div class="card-front">
            <img class="card-image" src="./week04_banner.png" alt="Weekly theme">
          </div>

          <div class="card-back">
            <img class="card-image" src="./week04_banner.png" alt="Weekly theme back">
          </div>

        </div>
      </div>
    </section>

    <!-- ===================== -->
    <!-- DAYS -->
    <!-- ===================== -->

    <section class="cards">

      <div class="day-card">
        <div class="card" onclick="toggleCard(this)">
          <div class="card-inner">
            <div class="card-front">
              <img class="card-image" src="./week04_mon.png" alt="Monday">
            </div>
            <div class="card-back">
              <img class="card-image" src="./week04_mon.png">
            </div>
          </div>
        </div>
      </div>

      <div class="day-card">
        <div class="card" onclick="toggleCard(this)">
          <div class="card-inner">
            <div class="card-front">
              <img class="card-image" src="./week04_tue.png">
            </div>
            <div class="card-back">
              <img class="card-image" src="./week04_tue.png">
            </div>
          </div>
        </div>
      </div>

      <div class="day-card">
        <div class="card" onclick="toggleCard(this)">
          <div class="card-inner">
            <div class="card-front">
              <img class="card-image" src="./week04_wed.png">
            </div>
            <div class="card-back">
              <img class="card-image" src="./week04_wed.png">
            </div>
          </div>
        </div>
      </div>

      <div class="day-card">
        <div class="card" onclick="toggleCard(this)">
          <div class="card-inner">
            <div class="card-front">
              <img class="card-image" src="./week04_thu.png">
            </div>
            <div class="card-back">
              <img class="card-image" src="./week04_thu.png">
            </div>
          </div>
        </div>
      </div>

      <div class="day-card">
        <div class="card" onclick="toggleCard(this)">
          <div class="card-inner">
            <div class="card-front">
              <img class="card-image" src="./week04_fri.png">
            </div>
            <div class="card-back">
              <img class="card-image" src="./week04_fri.png">
            </div>
          </div>
        </div>
      </div>

    </section>

  </main>

  <!-- ===================== -->
  <!-- BEHAVIOR -->
  <!-- ===================== -->

  <script>
    function toggleCard(card) {

      // collapse if already open
      if (card.classList.contains('expanded')) {
        card.classList.remove('expanded');
        card.classList.remove('flipped');
        document.querySelector('.overlay')?.remove();
        return;
      }

      // reset others
      document.querySelectorAll('.card.expanded').forEach(c => {
        c.classList.remove('expanded');
        c.classList.remove('flipped');
      });
      document.querySelector('.overlay')?.remove();

      // expand + flip
      card.classList.add('expanded');
      card.classList.add('flipped');

      const overlay = document.createElement('div');
      overlay.className = 'overlay';

      overlay.onclick = () => {
        card.classList.remove('expanded');
        card.classList.remove('flipped');
        overlay.remove();
      };

      document.body.appendChild(overlay);
    }
  </script>

</body>
</html>
